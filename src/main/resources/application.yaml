server:
  servlet:
    context-path: /api

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      validation-timeout: 5000
      max-lifetime: 1800000
      idle-timeout: 600000
      keepalive-time: 300000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    # Na primeira adoção do Flyway em um banco existente, configure
    # SPRING_FLYWAY_BASELINE_VERSION com a última migration já aplicada.
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:1}
    locations: classpath:db/migration
    validate-on-migrate: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  mail:
    host: smtp.sendgrid.net
    port: 587
    username: apikey
    password: ${SENDGRID_API_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          from: noreply@rando.esp.br
  jackson:
    deserialization:
      fail-on-null-for-primitives: false
logging:
  level:
    com.zaxxer.hikari: ERROR
    org.flywaydb: INFO
    org.springframework.boot.autoconfigure.flyway: INFO

app:
  security:
    jwt-secret: ${JWT_SECRET}
    jwt-expiration-ms: 86400000
  # Em desenvolvimento, resolve para a pasta "uploads" na raiz do backend.
  # Em Docker/produção, APP_UPLOAD_DIR pode continuar apontando para /app/uploads.
  upload-dir: ${APP_UPLOAD_DIR:./uploads}
  frontend-url: https://rando.esp.br
asaas:
  api-key: ${ASAAS_API_KEY}
  environment: ${ASAAS_ENV}
  webhook-secret: ${WEBHOOK_SECRET}
